name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e .
      - run: python -c "from proxyforge.config import load_config; print('config OK')"
      - run: python -c "from proxyforge.protocols import gen_uuid, make_link; print('protocols OK')"
      - run: python -c "from proxyforge.cardgen import generate_customer_card; print('cardgen OK')"
      - run: python -c "from proxyforge.xray import is_installed; print('xray OK')"
