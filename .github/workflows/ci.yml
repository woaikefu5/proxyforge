name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pylint
      - run: pylint proxyforge/ --disable=C0114,C0115,C0116,R0903,W0719

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt
      - run: python -c "from proxyforge.config import load_config; print('config OK')"
      - run: python -c "from proxyforge.protocols import gen_uuid, make_link; print('protocols OK')"
      - run: python -c "from proxyforge.cardgen import generate_customer_card; print('cardgen OK')"
      - run: python -c "from proxyforge.xray import is_installed; print('xray OK')"

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
